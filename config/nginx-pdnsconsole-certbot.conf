# PDNS Console Nginx Configuration (Certbot-friendly HTTP-only)
# For hostname: dev.pdnsconsole.com
# Document root: /var/www/pdnsconsole/webroot

server {
    listen 80;
    listen [::]:80;
    server_name dev.pdnsconsole.com;

    # Document root
    root /var/www/pdnsconsole/webroot;
    index index.php index.html;

    # Allow Certbot to use the ACME HTTP challenge
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        try_files $uri =404;
    }

    # Main location block - PHP handling
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM handling (adjust socket if needed)
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Deny access to sensitive files
    location ~ /(\.ht|\.git|\.svn) {
        deny all;
        access_log off;
        log_not_found off;
    }
}
